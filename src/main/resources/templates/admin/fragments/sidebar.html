<div id="sidebar"
     th:fragment="sidebar"
     class="sidebar bg-white shadow-2xl border-r border-gray-200 flex flex-col">

    <!-- ==========================
            Logo Section
    =========================== -->

    <div class="px-8 py-8 border-b border-gray-100">

        <div class="flex items-center gap-4">

            <img th:src="@{/logo/tadlogo.png}"
                 class="w-16 h-16 rounded-full shadow-lg border-4 border-indigo-100">

            <div>

                <h2 class="text-2xl font-bold text-gray-800">

                    THE AD.

                </h2>

                <p class="text-sm text-gray-500">

                    Since 1986

                </p>

            </div>

        </div>

    </div>

    <!-- ==========================
            Navigation
    =========================== -->

    <div class="flex-1 overflow-y-auto px-5 py-6">

        <p class="text-xs uppercase text-gray-400 font-semibold tracking-widest px-4 mb-5">

            Main Menu

        </p>

        <nav class="space-y-2">

            <!-- Dashboard -->

            <a th:href="@{/admin/dashboard}"
               th:classappend="${activeMenu == 'dashboard'} ?
   'bg-gradient-to-r from-indigo-600 to-purple-600 text-white shadow-lg' :
   'text-gray-700 hover:bg-indigo-50 hover:text-indigo-600'"
               class="group flex items-center gap-4 px-5 py-4 rounded-2xl transition">

                <i class="fa-solid fa-house text-lg"></i>

                <span class="font-semibold">
        Dashboard
    </span>

            </a>

            <!-- Services -->

            <a href="#"
               class="group flex items-center gap-4 px-5 py-4 rounded-2xl text-gray-700 hover:bg-indigo-50 hover:text-indigo-600 transition">

                <i class="fa-solid fa-bullhorn text-lg"></i>

                <span>Services</span>

            </a>

            <a th:href="@{/admin/enquiries}"
               th:classappend="${activeMenu == 'enquiries'} ?
   'bg-gradient-to-r from-indigo-600 to-purple-600 text-white shadow-lg' :
   'text-gray-700 hover:bg-indigo-50 hover:text-indigo-600'"
               class="group flex items-center justify-between px-5 py-4 rounded-2xl transition">

                <div class="flex items-center gap-4">

                    <i class="fa-solid fa-envelope text-lg"></i>

                    <span>

            Enquiries

        </span>

                </div>

                <span class="bg-red-500 text-white text-xs px-2 py-1 rounded-full">

        [[${contactMessages != null ? contactMessages.size() : 0}]]

    </span>

            </a>

            <!-- Portfolio -->

            <a href="#"
               class="group flex items-center gap-4 px-5 py-4 rounded-2xl text-gray-700 hover:bg-indigo-50 hover:text-indigo-600 transition">

                <i class="fa-solid fa-images text-lg"></i>

                <span>Portfolio</span>

            </a>

            <!-- Blogs -->

            <a href="#"
               class="group flex items-center gap-4 px-5 py-4 rounded-2xl text-gray-700 hover:bg-indigo-50 hover:text-indigo-600 transition">

                <i class="fa-solid fa-blog text-lg"></i>

                <span>Blogs</span>

            </a>

            <!-- Gallery -->

            <a href="#"
               class="group flex items-center gap-4 px-5 py-4 rounded-2xl text-gray-700 hover:bg-indigo-50 hover:text-indigo-600 transition">

                <i class="fa-solid fa-photo-film text-lg"></i>

                <span>Gallery</span>

            </a>

            <!-- Testimonials -->

            <a href="#"
               class="group flex items-center gap-4 px-5 py-4 rounded-2xl text-gray-700 hover:bg-indigo-50 hover:text-indigo-600 transition">

                <i class="fa-solid fa-star text-lg"></i>

                <span>Testimonials</span>

            </a>

            <!-- Settings -->

            <a href="#"
               class="group flex items-center gap-4 px-5 py-4 rounded-2xl text-gray-700 hover:bg-indigo-50 hover:text-indigo-600 transition">

                <i class="fa-solid fa-gear text-lg"></i>

                <span>Settings</span>

            </a>

        </nav>

    </div>

    <!-- ==========================
            Admin Card
    =========================== -->

    <div class="px-5">

        <div class="bg-gradient-to-r from-indigo-50 to-purple-50 rounded-2xl p-5 border border-indigo-100">

            <div class="flex items-center gap-4">

                <div class="w-12 h-12 rounded-full bg-indigo-600 text-white flex items-center justify-center font-bold text-lg">

                    A

                </div>

                <div>

                    <h4 class="font-semibold">

                        Administrator

                    </h4>

                    <div class="flex items-center gap-2 mt-1">

                        <span class="w-2 h-2 bg-green-500 rounded-full"></span>

                        <span class="text-sm text-gray-500">

                            Online

                        </span>

                    </div>

                </div>

            </div>

        </div>

    </div>

    <!-- ==========================
            Logout
    =========================== -->

    <div class="p-5">

        <form th:action="@{/logout}" method="post">

            <button
                    class="w-full flex items-center justify-center gap-3 bg-red-500 hover:bg-red-600 text-white rounded-2xl py-4 transition">

                <i class="fa-solid fa-right-from-bracket"></i>

                Logout

            </button>

        </form>

    </div>

</div>
